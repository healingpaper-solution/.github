# Repository settings for connect-auth-module
# This configuration allows only rebase merge for pull requests

repository:
  # Repository name
  name: connect-auth-module

  # Either `true` to allow squash-merging pull requests, or `false` to prevent
  # squash-merging.
  allow_squash_merge: false

  # Either `true` to allow merging pull requests with a merge commit, or `false`
  # to prevent merging pull requests with merge commits.
  allow_merge_commit: false

  # Either `true` to allow rebase-merging pull requests, or `false` to prevent
  # rebase-merging.
  allow_rebase_merge: true

  # Either `true` to allow auto-merge on pull requests, or `false` to disallow auto-merge.
  allow_auto_merge: false

  # Either `true` to always allow a pull request head branch that is behind its base
  # branch to be updated even if it is not required to be up to date before merging,
  # or `false` otherwise.
  allow_update_branch: true
